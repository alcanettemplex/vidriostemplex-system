# Docker Compose unificado — Vidrios Templex System
# Utilizar con: docker compose up -d

version: '3.8'

services:
  # ─── Backend API ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: templex-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Frontend Web ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: templex-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx Reverse Proxy (opcional para producción) ───────────────────
